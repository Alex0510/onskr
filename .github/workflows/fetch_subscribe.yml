name: 获取并更新VPN订阅节点

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-subscribe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 从 Gist 下载脚本（使用 Secret）
        run: |
          curl -o fetch_proxy.py "${{ secrets.PEAVPN }}"
          chmod +x fetch_proxy.py

      - name: 运行订阅获取脚本
        run: python fetch_proxy.py

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribe_nodes.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新订阅节点 $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
        continue-on-error: true

      - name: 上传节点文件
        uses: actions/upload-artifact@v4
        with:
          name: subscribe-nodes
          path: subscribe_nodes.txt
