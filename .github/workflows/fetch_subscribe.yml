name: VPN订阅与节点（每2小时）

on:
  schedule:
    - cron: '0 */2 * * *'   # 每2小时运行一次
  workflow_dispatch:          # 允许手动触发

jobs:
  update-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许提交更改到仓库

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装公共依赖
        run: pip install requests pycryptodome

      # ---------- 第一个脚本：获取 VPN 订阅节点 ----------
      - name: 从 Gist 下载脚本1（PEAVPN）
        run: |
          curl -o fetch_proxy1.py "${{ secrets.PEAVPN }}"
          chmod +x fetch_proxy1.py

      - name: 运行脚本1 - 生成 subscribe_nodes.txt
        run: python fetch_proxy1.py

      # ---------- 第二个脚本：合并节点 ----------
      - name: 从 Gist 下载脚本2（ONSKR）
        run: |
          curl -o fetch_proxy2.py "${{ secrets.ONSKR }}"
          chmod +x fetch_proxy2.py

      - name: 运行脚本2 - 生成 proxies.txt
        run: python fetch_proxy2.py

      # ---------- 提交并推送所有节点文件 ----------
      - name: 提交并推送更新（如有变更）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribe_nodes.txt proxies.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新订阅节点和合并节点 $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
        continue-on-error: true

      # ---------- 分别上传两个文件作为 Artifact ----------
      - name: 上传 subscribe_nodes.txt
        uses: actions/upload-artifact@v4
        with:
          name: subscribe-nodes
          path: subscribe_nodes.txt

      - name: 上传 proxies.txt
        uses: actions/upload-artifact@v4
        with:
          name: proxies
          path: proxies.txt        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscribe_nodes.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新订阅节点 $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
        continue-on-error: true

      - name: 上传节点文件
        uses: actions/upload-artifact@v4
        with:
          name: subscribe-nodes
          path: subscribe_nodes.txt
