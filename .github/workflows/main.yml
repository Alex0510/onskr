name: 每日合并节点

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时运行一次
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests pycryptodome
      - run: python fetch_nodes.py
      - uses: actions/upload-artifact@v4
        with:
          name: proxies
          path: proxies.txt
      - name: 提交到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@example.com"
          git add proxies.txt
          git commit -m "自动更新节点 $(date +'%Y-%m-%d %H:%M')" || echo "无变化"
          git push